# For production outside Netlify, add your OAuth service values under backend:
# base_url: https://your-oauth-service.example.com
# auth_endpoint: auth

backend:
  name: github
  repo: tadawilifetech/tadawilifetech.github.io
  branch: main
  squash_merges: true

local_backend: true

site_url: https://tadawilifetech.com
display_url: https://tadawilifetech.com

logo:
  src: /logo-tadawi.svg
  show_in_header: false

locale: en
show_preview_links: false

editor:
  preview: false

media_folder: public/uploads
public_folder: /uploads

slug:
  encoding: unicode
  clean_accents: true

i18n:
  structure: multiple_files
  locales: [en, ar, fa]
  default_locale: en

collections:
  - name: posts
    label: Posts
    label_singular: Post
    description: Manage site posts
    folder: src/content/posts
    create: true
    delete: true
    extension: md
    format: frontmatter
    media_folder: ""
    public_folder: ""
    summary: "{{title}}"
    i18n: true
    sortable_fields:
      - published
      - updated
      - title
    view_filters:
      - label: Drafts
        field: draft
        pattern: true
      - label: Published
        field: draft
        pattern: false
    fields:
      - label: Title
        name: title
        widget: string
        i18n: true
      - label: Translation Key
        name: translationKey
        widget: string
        required: true
        hint: Shared identifier across all language versions.
        i18n: duplicate
      - label: Published At
        name: published
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        format: YYYY-MM-DD
        i18n: duplicate
      - label: Updated At
        name: updated
        widget: datetime
        required: false
        date_format: YYYY-MM-DD
        time_format: false
        format: YYYY-MM-DD
        i18n: duplicate
      - label: Description
        name: description
        widget: text
        required: false
        i18n: true
      - label: Cover Image
        name: image
        widget: image
        required: false
        hint: Upload the image into the same post folder.
        i18n: duplicate
      - label: Tags
        name: tags
        widget: list
        required: false
        i18n: true
      - label: Category
        name: category
        widget: string
        required: false
        i18n: true
      - label: Draft
        name: draft
        widget: boolean
        default: true
        required: false
        i18n: duplicate
      - label: Language Code
        name: lang
        widget: hidden
        i18n: true
      - label: Content
        name: body
        widget: markdown
        i18n: true

  - name: pages
    label: Pages
    label_singular: Page
    description: Manage static pages
    files:
      - label: About Page
        name: about
        file: src/content/spec/about.md
        preview_path: en/about/
        fields:
          - label: Translation Key
            name: translationKey
            widget: hidden
            default: about
          - label: Language Code
            name: lang
            widget: hidden
            default: en
          - label: Content
            name: body
            widget: markdown
      - label: About Page (Arabic)
        name: about_ar
        file: src/content/spec/about.ar.md
        preview_path: ar/about/
        fields:
          - label: Translation Key
            name: translationKey
            widget: hidden
            default: about
          - label: Language Code
            name: lang
            widget: hidden
            default: ar
          - label: Content
            name: body
            widget: markdown
      - label: About Page (Persian)
        name: about_fa
        file: src/content/spec/about.fa.md
        preview_path: fa/about/
        fields:
          - label: Translation Key
            name: translationKey
            widget: hidden
            default: about
          - label: Language Code
            name: lang
            widget: hidden
            default: fa
          - label: Content
            name: body
            widget: markdown
      - label: Contact Page
        name: contact
        file: src/content/spec/contact.md
        preview_path: en/contact/
        fields:
          - label: Translation Key
            name: translationKey
            widget: hidden
            default: contact
          - label: Language Code
            name: lang
            widget: hidden
            default: en
          - label: Content
            name: body
            widget: markdown
      - label: Contact Page (Arabic)
        name: contact_ar
        file: src/content/spec/contact.ar.md
        preview_path: ar/contact/
        fields:
          - label: Translation Key
            name: translationKey
            widget: hidden
            default: contact
          - label: Language Code
            name: lang
            widget: hidden
            default: ar
          - label: Content
            name: body
            widget: markdown
      - label: Contact Page (Persian)
        name: contact_fa
        file: src/content/spec/contact.fa.md
        preview_path: fa/contact/
        fields:
          - label: Translation Key
            name: translationKey
            widget: hidden
            default: contact
          - label: Language Code
            name: lang
            widget: hidden
            default: fa
          - label: Content
            name: body
            widget: markdown

  - name: products
    label: Products
    label_singular: Product
    description: Manage products
    folder: src/content/products
    create: true
    delete: true
    extension: md
    format: frontmatter
    media_folder: ""
    public_folder: ""
    summary: "{{title}}"
    i18n: true
    sortable_fields:
      - published
      - updated
      - title
    view_filters:
      - label: Drafts
        field: draft
        pattern: true
      - label: Published
        field: draft
        pattern: false
    fields:
      - label: Title
        name: title
        widget: string
        i18n: true
      - label: Translation Key
        name: translationKey
        widget: string
        required: true
        hint: Shared identifier across all language versions.
        i18n: duplicate
      - label: Published At
        name: published
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        format: YYYY-MM-DD
        i18n: duplicate
      - label: Updated At
        name: updated
        widget: datetime
        required: false
        date_format: YYYY-MM-DD
        time_format: false
        format: YYYY-MM-DD
        i18n: duplicate
      - label: Description
        name: description
        widget: text
        required: false
        i18n: true
      - label: Cover Image
        name: image
        widget: image
        required: false
        hint: Upload the image into the same product folder.
        i18n: duplicate
      - label: Price
        name: price
        widget: string
        required: false
        i18n: duplicate
      - label: Tags
        name: tags
        widget: list
        required: false
        i18n: true
      - label: Category
        name: category
        widget: string
        required: false
        i18n: true
      - label: Draft
        name: draft
        widget: boolean
        default: true
        required: false
        i18n: duplicate
      - label: Language Code
        name: lang
        widget: hidden
        i18n: true
      - label: Content
        name: body
        widget: markdown
        i18n: true