backend:
  name: github
  repo: tadawilifetech/tadawilifetech.github.io
  branch: main
  squash_merges: true
  base_url: https://decap-cms-oauth.miladsoft.workers.dev
  auth_endpoint: auth

site_url: https://tadawilifetech.com
display_url: https://tadawilifetech.com

logo:
  src: /logo-tadawi.svg
  show_in_header: false

locale: en
show_preview_links: false

editor:
  preview: false

media_folder: public/uploads
public_folder: /uploads

slug:
  encoding: unicode
  clean_accents: true

collections:
  - name: posts_en
    label: "Posts (English)"
    label_singular: "Post (EN)"
    description: English posts
    folder: src/content/posts
    path: "{{slug}}/index"
    create: true
    delete: true
    extension: md
    format: frontmatter
    media_folder: /public/uploads/posts
    public_folder: /uploads/posts
    filter:
      field: lang
      value: en
    summary: "{{title}}"
    sortable_fields:
      - published
      - updated
      - title
    view_filters:
      - label: Drafts
        field: draft
        pattern: true
      - label: Published
        field: draft
        pattern: false
    fields:
      - label: Title
        name: title
        widget: string
      - label: Translation Key
        name: translationKey
        widget: string
        required: true
        hint: Shared identifier across all language versions.
      - label: Published At
        name: published
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        format: YYYY-MM-DD
      - label: Updated At
        name: updated
        widget: datetime
        required: false
        date_format: YYYY-MM-DD
        time_format: false
        format: YYYY-MM-DD
      - label: Description
        name: description
        widget: text
        required: false
      - label: Cover Image
        name: image
        widget: image
        required: false
      - label: Tags
        name: tags
        widget: list
        required: false
      - label: Category
        name: category
        widget: string
        required: false
      - label: Draft
        name: draft
        widget: boolean
        default: true
        required: false
      - label: Language Code
        name: lang
        widget: hidden
        default: en
      - label: Content
        name: body
        widget: markdown

