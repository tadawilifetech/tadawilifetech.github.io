			:root {
				color-scheme: light;
				font-family: "Roboto", "Segoe UI", sans-serif;
				background: #f5f7fb;
				color: #111827;
			}
			body { margin: 0; min-height: 100vh; }

			.noscript {
				max-width: 36rem;
				margin: 12vh auto;
				padding: 1.25rem 1.5rem;
				border-radius: 1rem;
				background: rgba(255,255,255,.92);
				box-shadow: 0 24px 80px rgba(15,23,42,.08);
				line-height: 1.7;
			}

			body.auth {
				display: grid;
				place-items: center;
				height: 100vh;
				overflow: hidden;
				margin: 0;
				background:
					radial-gradient(circle at 12% 18%, rgba(15,118,110,.16), transparent 24%),
					radial-gradient(circle at 88% 20%, rgba(37,99,235,.16), transparent 26%),
					linear-gradient(180deg, #eef4ff, #f3f6fb 45%, #edf3f8);
			}
			body.auth::before,
			body.auth::after {
				content: "";
				position: fixed;
				pointer-events: none;
				z-index: 0;
				filter: blur(14px);
				border-radius: 999px;
			}
			body.auth::before {
				width: 18rem; height: 18rem;
				top: 5rem; left: -4rem;
				background: rgba(14,165,233,.14);
			}
			body.auth::after {
				width: 20rem; height: 20rem;
				right: -5rem; bottom: 2rem;
				background: rgba(20,184,166,.12);
			}

			[class*="exus10f5"] {
				position: relative;
				z-index: 1;
				box-sizing: border-box;
				width: min(34rem, calc(100vw - 2rem));
				min-height: auto;
				margin: 0 auto;
				padding: clamp(2rem, 4vw, 3rem);
				gap: 1.25rem;
				align-items: stretch;
				justify-content: center;
				border: none;
				background: transparent;
				box-shadow: none;
				backdrop-filter: none;
			}
			[class*="exus10f5"] > p {
				margin: 0;
				padding: .875rem 1rem;
				border-radius: 1rem;
				background: rgba(239,68,68,.08);
				color: #991b1b;
				font-size: .95rem;
				line-height: 1.6;
			}

			[class*="exus10f3"],
			[class*="exus10f2"] { display: none !important; }

			[class*="exus10f4"] {
				display: flex;
				align-items: center;
				justify-content: center;
				width: 100%;
				margin: 0 0 .5rem;
			}
			[class*="exus10f4"] img {
				display: block;
				width: min(14rem, 72%);
				height: auto;
				max-height: 4rem;
				object-fit: contain;
				filter: drop-shadow(0 10px 18px rgba(15,23,42,.12));
			}

			[class*="exus10f1"] {
				justify-content: center;
				width: 100%;
				min-height: 3.75rem;
				padding: 0 1.4rem;
				border: 0;
				border-radius: 1rem;
				background: linear-gradient(135deg, #0f766e, #115e59);
				box-shadow: 0 18px 40px rgba(15,118,110,.28);
				color: #f8fafc;
				font-size: 1rem;
				font-weight: 700;
				letter-spacing: .01em;
				-webkit-text-fill-color: #f8fafc;
				text-fill-color: #f8fafc;
				transition: transform 160ms, box-shadow 160ms, filter 160ms;
			}
			[class*="exus10f1"],
			[class*="exus10f1"] * {
				color: #f8fafc !important;
				fill: currentColor;
			}
			[class*="exus10f1"]:hover {
				transform: translateY(-1px);
				box-shadow: 0 22px 48px rgba(15,118,110,.32);
				filter: saturate(1.05);
			}
			[class*="exus10f1"]:disabled {
				transform: none; box-shadow: none;
				background: linear-gradient(135deg, #94a3b8, #64748b);
				cursor: wait;
			}

			[class*="exus10f5"] a {
				align-self: center;
				margin-top: .25rem;
				color: #475569;
				font-size: .94rem;
				font-weight: 600;
				text-decoration: none;
				transition: color 160ms;
			}
			[class*="exus10f5"] a:hover { color: #0f172a; }

			@media (max-width: 640px) {
				[class*="exus10f5"] {
					width: min(100vw - 1rem, 34rem);
					margin: 0 auto;
					padding: 1.25rem;
				}
			}
