# For production outside Netlify, add your OAuth service values under backend:
# base_url: https://your-oauth-service.example.com
# auth_endpoint: auth

backend:
  name: github
  repo: tadawilifetech/tadawilifetech.github.io
  branch: main
  squash_merges: true

local_backend: true

site_url: https://tadawilifetech.com
display_url: https://tadawilifetech.com

logo:
  src: /logo-tadawi.svg
  show_in_header: false

locale: en
show_preview_links: false

editor:
  preview: false

media_folder: public/uploads
public_folder: /uploads

slug:
  encoding: unicode
  clean_accents: true

collections:
  - name: posts
    label: Posts
    label_singular: Post
    description: Manage site posts
    folder: src/content/posts
    create: true
    delete: true
    extension: md
    format: frontmatter
    path: "{{slug}}/index"
    media_folder: ""
    public_folder: ""
    preview_path: posts/{{slug}}/
    summary: "{{title}}"
    sortable_fields:
      - published
      - updated
      - title
    view_filters:
      - label: Drafts
        field: draft
        pattern: true
      - label: Published
        field: draft
        pattern: false
    fields:
      - label: Title
        name: title
        widget: string
      - label: Published At
        name: published
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        format: YYYY-MM-DD
      - label: Updated At
        name: updated
        widget: datetime
        required: false
        date_format: YYYY-MM-DD
        time_format: false
        format: YYYY-MM-DD
      - label: Description
        name: description
        widget: text
        required: false
      - label: Cover Image
        name: image
        widget: image
        required: false
        hint: Upload the image into the same post folder.
      - label: Tags
        name: tags
        widget: list
        required: false
      - label: Category
        name: category
        widget: string
        required: false
      - label: Draft
        name: draft
        widget: boolean
        default: true
        required: false
      - label: Language Code
        name: lang
        widget: select
        required: false
        default: en
        options:
          - label: en
            value: en
          - label: ar
            value: ar
      - label: Content
        name: body
        widget: markdown

  - name: pages
    label: Pages
    label_singular: Page
    description: Manage static pages
    files:
      - label: About Page
        name: about
        file: src/content/spec/about.md
        preview_path: about/
        fields:
          - label: Content
            name: body
            widget: markdown
      - label: Contact Page
        name: contact
        file: src/content/spec/contact.md
        preview_path: contact/
        fields:
          - label: Content
            name: body
            widget: markdown